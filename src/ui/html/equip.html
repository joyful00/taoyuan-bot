<div class="ty-config-group ty-highlight-group">
  <div class="ty-config-row">
    <label style="width: 55px; color: var(--ty-accent)">编辑套装</label>
    <select
      id="equip-preset-selector"
      style="flex: 1; margin-right: 6px"
    ></select>
    <button
      id="btn-add-preset"
      class="ty-icon-btn"
      title="新增套装"
      style="color: #10b981; font-size: 14px"
    >
      ➕
    </button>
    <button
      id="btn-del-preset"
      class="ty-icon-btn"
      title="删除当前套装"
      style="color: #ef4444; font-size: 14px"
    >
      🗑️
    </button>
  </div>
  <div class="ty-config-row" style="margin-top: 8px">
    <label style="width: 55px">套装名称</label>
    <input type="text" id="eq-preset-name" placeholder="输入套装名称" />
  </div>
</div>

<div class="ty-config-group">
  <div
    class="ty-config-title"
    style="display: flex; justify-content: space-between"
  >
    <span>🎒 装备搭配</span>
    <button
      id="btn-refresh-inv"
      class="ty-icon-btn"
      title="刷新背包数据"
      style="font-size: 12px; color: var(--ty-accent)"
    >
      🔄 获取背包
    </button>
  </div>
  <div class="ty-config-row">
    <label>帽子</label
    ><select id="eq-hat"></select>
  </div>
  <div class="ty-config-row">
    <label>武器</label
    ><select id="eq-weapon"></select>
  </div>
  <div class="ty-config-row">
    <label>戒指1</label
    ><select id="eq-ring1"></select>
  </div>
  <div class="ty-config-row">
    <label>戒指2</label
    ><select id="eq-ring2"></select>
  </div>
  <div class="ty-config-row">
    <label>鞋子</label
    ><select id="eq-shoe"></select>
  </div>
  <button class="ty-save-btn" id="btn-save-equip" style="margin-top: 8px">
    💾 保存当前套装
  </button>
</div>

<div class="ty-config-group">
  <div class="ty-config-title">📍 场景绑定配置</div>
  <div
    id="scene-mapping-container"
    style="max-height: 140px; overflow-y: auto; padding-right: 4px"
  ></div>
</div>
